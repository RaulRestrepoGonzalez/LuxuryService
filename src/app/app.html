<header class="site-header">
  <a routerLink="/" class="site-brand" (click)="closeMenu()"><img src="/logo.png" alt="Luxury Service" class="site-logo" /></a>
  <button type="button" class="site-hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
  <nav class="site-nav" [class.open]="menuOpen">
    <div class="site-nav-group">
      <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">🏠 Inicio</a>
      <a routerLink="/agendar-cita" routerLinkActive="nav-active" (click)="closeMenu()">📅 Agendar cita</a>
      <a routerLink="/tienda" routerLinkActive="nav-active" (click)="closeMenu()">🛍️ Productos</a>
      <a routerLink="/tarjeta-regalo" routerLinkActive="nav-active" (click)="closeMenu()">🎁 Gift Card</a>
    </div>
    @if (auth.currentUser$ | async; as user) {
      <div class="site-nav-group site-nav-group-user">
        <a routerLink="/client/mis-citas" routerLinkActive="nav-active" (click)="closeMenu()">Mis citas</a>
        <a routerLink="/client/perfil" routerLinkActive="nav-active" (click)="closeMenu()">{{ user.nombre }}</a>
        <span class="site-nav-email">{{ user.email }}</span>
        @if (auth.isAdmin()) {
          <div class="site-nav-admin">
            <a routerLink="/admin/dashboard" class="site-nav-dashboard" routerLinkActive="nav-active-dash" (click)="closeMenu()">Dashboard</a>
            <a routerLink="/admin/importar" class="site-nav-import" routerLinkActive="nav-active-dash" (click)="closeMenu()">Importar</a>
          </div>
        }
      </div>
    } @else {
      <div class="site-nav-group site-nav-group-cta">
        <a routerLink="/acceso" class="site-nav-cta" (click)="closeMenu()">Acceder</a>
      </div>
    }
  </nav>
</header>
<main class="app-content">
  <router-outlet></router-outlet>
</main>
<app-chatbot-floating></app-chatbot-floating>
