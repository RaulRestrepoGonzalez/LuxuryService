<header class="site-header">
  <a routerLink="/" class="site-brand"><img src="/logo.png" alt="Luxury Service" class="site-logo" /></a>
  <nav class="site-nav">
    <a routerLink="/">Inicio</a>
    <a routerLink="/servicios">Servicios</a>
    <a routerLink="/tienda">Tienda</a>
    <a routerLink="/agendar-cita">Agendar cita</a>
    @if (auth.currentUser$ | async; as user) {
      <a routerLink="/client/mis-citas">Mis citas</a>
      <a routerLink="/client/perfil">{{ user.nombre }}</a>
      @if (auth.isAdmin()) {
        <a routerLink="/admin/dashboard" class="site-nav-dashboard">Dashboard</a>
      }
    } @else {
      <a routerLink="/acceso" class="site-nav-cta">Acceder</a>
    }
  </nav>
</header>
<main class="app-content">
  <router-outlet></router-outlet>
</main>
<app-chatbot-floating></app-chatbot-floating>
